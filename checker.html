<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Amazon Prime アニメチェッカー</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 16px;
        }
        h2 {
            margin-bottom: 4px;
        }
        #updated {
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }
        #outputBox div {
            padding: 4px 0;
            font-size: 15px;
        }
        a {
            color: inherit;
        }
        .error {
            color: gray;
        }
        .manual-btn {
            margin-top: 20px;
            padding: 6px 14px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2>Amazon Prime アニメチェッカー</h2>
    <div id="updated">読み込み中...</div>
    <div id="outputBox"></div>
    <button class="manual-btn" onclick="loadResults()">再読み込み</button>

    <script>
        let previousResults = {};

        window.onload = () => {
            const stored = localStorage.getItem("previousResults");
            if (stored) {
                previousResults = JSON.parse(stored);
            }
            loadResults();
        };

        async function loadResults() {
            document.getElementById("updated").textContent = "読み込み中...";
            try {
                const res = await fetch("results.json?t=" + Date.now());
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                displayResults(data);
            } catch (e) {
                document.getElementById("updated").textContent = "results.json が見つかりません（まだ Actions が実行されていない可能性があります）";
                console.error(e);
            }
        }

        function displayResults(data) {
            const output = document.getElementById("outputBox");
            output.innerHTML = "";

            document.getElementById("updated").textContent = "最終更新: " + (data.updated_at || "不明");

            if (!data || !Array.isArray(data.results)) {
                output.textContent = "レスポンス形式が不正です";
                return;
            }

            data.results.forEach(item => {
                const div = document.createElement("div");

                if (typeof item === "string" || item.error) {
                    div.textContent = (item.title || item) + (item.error ? ` → ${item.error}` : "");
                    div.className = "error";
                    output.appendChild(div);
                    return;
                }

                const { title, url, watched, total, status } = item;

                const a = document.createElement("a");
                a.href = url;
                a.target = "_blank";
                a.textContent = title;
                div.appendChild(a);
                div.appendChild(document.createTextNode(` → ${watched}/${total}話  ${status}`));

                const prev = previousResults[title];
                if (!prev || prev[0] != watched || prev[1] != total || prev[2] != status) {
                    div.style.color = "red";
                } else {
                    div.style.color = "black";
                }
                previousResults[title] = [watched, total, status, url];
                output.appendChild(div);
            });

            localStorage.setItem("previousResults", JSON.stringify(previousResults));
        }
    </script>
</body>

</html>
